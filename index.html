<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Portal Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="header">
  <h1>🚀 Job Portal Pro</h1>
  <input type="text" id="searchBar" placeholder="🔍 Search jobs, companies..." />
</header>

<div class="container">

  <aside class="sidebar">
    <h3>Filters</h3>

    <label>Company</label>
    <select id="companyFilter"><option value="">All</option></select>

    <label>Role</label>
    <select id="roleFilter">
      <option value="">All</option>
      <option>Developer</option>
      <option>Designer</option>
      <option>Manager</option>
      <option>Data Analyst</option>
      <option>Tester</option>
    </select>

    <label>Location</label>
    <select id="locationFilter">
      <option value="">All</option>
      <option>Chennai</option>
      <option>Bangalore</option>
      <option>Hyderabad</option>
      <option>Pune</option>
      <option>Delhi</option>
    </select>
  </aside>

  <main>
    <h2>🔥 Available Jobs</h2>
    <div id="jobList" class="job-grid"></div>

    <h2>⭐ Saved Jobs</h2>
    <div id="savedJobs" class="job-grid"></div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
